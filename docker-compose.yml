version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: pandatrack_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - pandatrack_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    sysctls:
      - net.core.somaxconn=1024

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: pandatrack_api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_DOMAIN=api.pandatrack.com.ua
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - pandatrack_network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

networks:
  pandatrack_network:
    driver: bridge

volumes:
  redis_data:
    driver: local